<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AegisCore</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Product+Sans&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Product Sans', 'Helvetica Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Custom Window Controls */
        .titlebar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 40px;
            -webkit-app-region: drag;
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            z-index: 1999;
            display: flex;
            align-items: center;
            padding-left: 1rem;
        }

        .titlebar-title {
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.5);
        }

        .window-controls {
            position: fixed;
            top: 0; right: 0;
            display: flex;
            z-index: 2000;
        }

        .window-button {
            width: 46px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: 0.2s;
        }

        .window-button:hover { background: rgba(139, 92, 246, 0.2); }
        .window-button.close:hover { background: #e74c3c; }

        /* Content Area */
        .content-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 40px;
        }

        /* The New Glowing Menu Section */
        .main-menu {
            display: flex;
            gap: 3rem;
            padding: 3rem;
            width: 90%;
            max-width: 1200px;
        }

        .menu-button {
            --background: linear-gradient(to left, #7c3aed 0%, #a78bfa 100%);
            flex: 1;
            height: 350px;
            padding: 3px; /* This creates the gradient border effect */
            border-radius: 1.5rem;
            overflow: visible;
            background: var(--background);
            position: relative;
            z-index: 1;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        /* The Glow Effect */
        .menu-button::after {
            position: absolute;
            content: "";
            top: 20px;
            left: 0;
            right: 0;
            z-index: -1;
            height: 100%;
            width: 100%;
            transform: scale(0.9);
            filter: blur(35px);
            background: var(--background);
            transition: opacity 0.5s ease;
            opacity: 0.6;
        }

        .menu-button:hover {
            transform: translateY(-10px);
        }

        .menu-button:hover::after {
            opacity: 0.9;
            transform: scale(0.95);
        }

        /* Inner Content Card */
        .card-info {
            background: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            border-radius: calc(1.5rem - 3px);
            position: relative;
            overflow: hidden;
        }

        .card-info .title {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            text-align: center;
            transition: 0.4s;
            z-index: 2;
        }

        .card-info .description {
            position: absolute;
            bottom: 2rem;
            opacity: 0;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            transition: 0.4s;
            transform: translateY(10px);
        }

        /* Hover States for Text */
        .menu-button:hover .title {
            color: #a78bfa;
            transform: translateY(-20px);
        }

        .menu-button:hover .description {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-menu { flex-direction: column; }
            .menu-button { height: 200px; }
        }
    </style>
</head>
<body>

    <div class="titlebar">
        <span class="titlebar-title">AEGISCORE</span>
    </div>

    <div class="window-controls">
        <button class="window-button" onclick="minimizeWindow()">—</button>
        <button class="window-button" onclick="maximizeWindow()">▢</button>
        <button class="window-button close" onclick="closeWindow()">✕</button>
    </div>

    <div class="content-wrapper">
        <div class="main-menu">
            <div class="menu-button" onclick="handleMenuClick('manual-scanning')">
                <div class="card-info">
                    <p class="title">Manual<br>Scanning</p>
                    <span class="description">Scan system on demand</span>
                </div>
            </div>

            <div class="menu-button" onclick="handleMenuClick('fine-tuning')">
                <div class="card-info">
                    <p class="title">Fine-Tuning<br>System</p>
                    <span class="description">Customize features</span>
                </div>
            </div>

            <div class="menu-button" onclick="handleMenuClick('threat-history')">
                <div class="card-info">
                    <p class="title">Threat<br>History</p>
                    <span class="description">Review past events</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Note: Replace these with your Electron logic
        function minimizeWindow() { console.log('minimize'); }
        function maximizeWindow() { console.log('maximize'); }
        function closeWindow() { console.log('close'); }
        function handleMenuClick(section) { console.log(section + ' clicked'); }
    </script>
</body>
</html>
