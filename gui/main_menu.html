<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AegisCore</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Product+Sans&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Product Sans', sans-serif;
            background: #000000;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Custom Title Bar */
        .titlebar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 40px;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            z-index: 1999;
            display: flex;
            align-items: center;
            padding-left: 1.5rem;
        }

        .titlebar-title {
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Content Area */
        .content-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 40px;
        }

        .main-menu {
            display: flex;
            gap: 2.5rem;
            padding: 2rem;
            width: 95%;
            max-width: 1300px;
            height: 80vh; /* Controlled height for the menu */
        }

        .menu-button {
            --background: linear-gradient(135deg, #7c3aed 0%, #3b82f6 100%);
            flex: 1;
            height: 100%; /* Makes them tall squares/rectangles */
            padding: 2px; 
            border-radius: 2rem;
            background: var(--background);
            position: relative;
            z-index: 1;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Enhanced Glow */
        .menu-button::after {
            position: absolute;
            content: "";
            top: 15px; left: 0; right: 0;
            z-index: -1;
            height: 100%; width: 100%;
            transform: scale(0.85);
            filter: blur(40px);
            background: var(--background);
            transition: opacity 0.5s ease, transform 0.5s ease;
            opacity: 0.4;
        }

        .menu-button:hover {
            transform: scale(1.02) translateY(-10px);
        }

        .menu-button:hover::after {
            opacity: 0.7;
            transform: scale(0.95);
        }

        /* Inner Card */
        .card-info {
            background: #0a0a0a;
            width: 100%;
            height: 100%;
            border-radius: calc(2rem - 2px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .card-info .title {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            text-align: center;
            line-height: 1.2;
            transition: 0.5s ease;
            color: #ffffff;
        }

        /* Liquid Metal / Glossy Subtext Effect */
        .card-info .description {
            position: absolute;
            bottom: 3rem;
            font-size: 0.85rem;
            font-weight: 400;
            padding: 0.8rem 1.5rem;
            
            /* Glassmorphism / Liquid Metal Style */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), 
                        inset 0 0 10px rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            
            color: rgba(255, 255, 255, 0.9);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            white-space: nowrap;
        }

        /* Hover States */
        .menu-button:hover .title {
            transform: translateY(-40px);
            background: linear-gradient(to bottom, #fff 20%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-button:hover .description {
            opacity: 1;
            transform: translateY(0);
        }

        /* Optional: Add a subtle moving light beam inside the card on hover */
        .card-info::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .menu-button:hover .card-info::before {
            opacity: 1;
        }

        @media (max-width: 900px) {
            .main-menu { flex-direction: column; height: auto; }
            .menu-button { height: 250px; }
        }
    </style>
</head>
<body>

    <div class="titlebar">
        <span class="titlebar-title">AEGISCORE v2.0</span>
    </div>

    <div class="content-wrapper">
        <div class="main-menu">
            <div class="menu-button" onclick="handleMenuClick('manual-scanning')">
                <div class="card-info">
                    <p class="title">Manual<br>Scanning</p>
                    <span class="description">Scan files and system on demand</span>
                </div>
            </div>

            <div class="menu-button" style="--background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);" onclick="handleMenuClick('fine-tuning')">
                <div class="card-info">
                    <p class="title">Fine-Tuning<br>System</p>
                    <span class="description">Customize protection features</span>
                </div>
            </div>

            <div class="menu-button" style="--background: linear-gradient(135deg, #f472b6 0%, #7c3aed 100%);" onclick="handleMenuClick('threat-history')">
                <div class="card-info">
                    <p class="title">Threat<br>History</p>
                    <span class="description">Review past security events</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleMenuClick(section) {
            console.log(`${section} selected`);
        }
    </script>
</body>
</html>
