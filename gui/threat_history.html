<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AegisCore - Threat History</title>
    <style>
        /* Professional Font Stack */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400&display=swap');
        
        :root {
            --bg-color: #050505;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-purple: #7c3aed;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-color);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Titlebar */
        .titlebar {
            height: 40px; background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; align-items: center; padding-left: 1.5rem;
            -webkit-app-region: drag;
        }
        .titlebar-title { 
            font-size: 0.7rem; 
            font-family: 'JetBrains Mono'; 
            color: rgba(255, 255, 255, 0.4);
            flex: 1;
        }
        .window-controls {
            display: flex;
            -webkit-app-region: no-drag;
        }
        .window-button {
            width: 46px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            background: transparent; border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer; transition: all 0.2s ease;
        }
        .window-button:hover {
            background: rgba(124, 58, 237, 0.2);
            color: #ffffff;
        }
        .window-button.close:hover {
            background: #e74c3c;
            color: #ffffff;
        }

        /* Header Area */
        .header-container {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .page-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }

        /* --- TOP LEFT LIQUID BUTTON --- */
        .back-btn-wrapper {
            position: absolute;
            top: 20px;
            left: 30px;
            width: 60px;
            height: 60px;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .back-btn-wrapper:hover {
            transform: scale(1.1);
        }

        /* The container for the shader */
        #liquid-back-btn {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .back-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            mix-blend-mode: difference;
            z-index: 10;
        }

        /* --- CONTENT LIST --- */
        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 15%; /* Centered reading view */
        }

        .threat-row {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 0.8rem;
            overflow: hidden;
            transition: background 0.2s;
        }

        .threat-row:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .threat-summary {
            padding: 1rem 1.5rem;
            display: grid;
            grid-template-columns: 20px 2fr 1fr 1fr 30px;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
        }

        .status-indicator { width: 8px; height: 8px; border-radius: 50%; }
        .critical { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .warning { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }

        .t-name { font-weight: 600; font-size: 0.95rem; }
        .t-date { color: #888; font-size: 0.85rem; font-family: 'JetBrains Mono', monospace; }
        .t-level { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
        
        .level-crit { color: #ef4444; }
        .level-warn { color: #f59e0b; }

        /* Dropdown Details */
        .threat-details {
            height: 0;
            overflow: hidden;
            transition: height 0.3s ease;
            background: rgba(0, 0, 0, 0.3);
        }

        .details-grid {
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .detail-item label {
            display: block;
            font-size: 0.7rem;
            color: #666;
            margin-bottom: 4px;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .detail-item div {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #ccc;
            word-break: break-all;
        }

    </style>
</head>
<body>

    <div class="titlebar">
        <span class="titlebar-title">AEGISCORE™</span>
        <div class="window-controls">
            <button class="window-button minimize" onclick="minimizeApp()" title="Minimize">
                <svg width="12" height="2" viewBox="0 0 12 2" fill="currentColor">
                    <rect width="12" height="2"/>
                </svg>
            </button>
            <button class="window-button maximize" onclick="maximizeApp()" title="Maximize">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1">
                    <rect x="0.5" y="0.5" width="11" height="11"/>
                </svg>
            </button>
            <button class="window-button close" onclick="closeApp()" title="Close">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M1 1L11 11M11 1L1 11"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="header-container">
        <div class="back-btn-wrapper" onclick="goBack()">
            <div id="liquid-back-btn">
                </div>
            <div class="back-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                    <path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/>
                </svg>
            </div>
        </div>

        <h1 class="page-title">Threat Containment Log // Database</h1>
    </div>

    <div class="list-container" id="listTarget">
        </div>

    <script>
        // Window controls
        function minimizeApp() { window.aegis.minimize(); }
        function maximizeApp() { window.aegis.maximize(); }
        function closeApp()    { window.aegis.close(); }
        
        // 1. Navigation Logic
        function goBack() {
            window.location.href = 'index.html';
        }

        // 2. Toggle Dropdown Logic
        function toggleDetails(id) {
            const el = document.getElementById(id);
            if (el.style.height && el.style.height !== '0px') {
                el.style.height = '0px';
            } else {
                el.style.height = el.scrollHeight + 'px';
            }
        }

        // 3. Mock Data & Render
        const data = [
            { id: 't1', name: "Trojan.Win32.Agent", date: "2026-02-12 14:22", level: "CRITICAL", path: "C:\\Windows\\Temp\\svc_host.exe", status: "critical" },
            { id: 't2', name: "Adware.BrowserMod", date: "2026-02-10 09:15", level: "WARNING", path: "C:\\Users\\Admin\\Downloads\\toolbar_installer.msi", status: "warning" },
            { id: 't3', name: "Miner.XMRig.Variant", date: "2026-02-08 23:40", level: "CRITICAL", path: "C:\\ProgramData\\Update\\updater.exe", status: "critical" }
        ];

        const list = document.getElementById('listTarget');
        
        list.innerHTML = data.map(item => `
            <div class="threat-row">
                <div class="threat-summary" onclick="toggleDetails('details-${item.id}')">
                    <div class="status-indicator ${item.status}"></div>
                    <div class="t-name">${item.name}</div>
                    <div class="t-date">${item.date}</div>
                    <div class="t-level ${item.status === 'critical' ? 'level-crit' : 'level-warn'}">${item.level}</div>
                    <div>▼</div>
                </div>
                <div class="threat-details" id="details-${item.id}">
                    <div class="details-grid">
                        <div class="detail-item">
                            <label>FILE PATH</label>
                            <div>${item.path}</div>
                        </div>
                        <div class="detail-item">
                            <label>ACTION TAKEN</label>
                            <div>Quarantined (AES-256 Encrypted)</div>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');

    </script>

    <script type="module">
        import { liquidMetalFragmentShader, ShaderMount } from "https://esm.sh/@paper-design/shaders";

        const container = document.getElementById("liquid-back-btn");

        new ShaderMount(
            container,
            liquidMetalFragmentShader,
            {
                u_repetition: 1.0,
                u_softness: 0.2,   // Sharper = more professional
                u_shiftRed: 0.1,
                u_shiftBlue: 0.9,  // Deep blue/purple
                u_distortion: 0.4,
                u_contour: 0.2,
                u_angle: 45,
                u_scale: 1.5,
                u_shape: 1,
                u_offsetX: 0,
                u_offsetY: 0
            },
            undefined,
            0.5
        );
    </script>
</body>
</html>
